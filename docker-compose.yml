services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: pv
      # Must match the password baked into Postgres on first run (see .env.example).
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pv}
      POSTGRES_DB: pv_intel
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pv -d pv_intel"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://pv:${POSTGRES_PASSWORD:-pv}@postgres:5432/pv_intel
      SOURCES_CONFIG_PATH: /app/config/sources.yaml
      # Comma-separated browser origins allowed to call the API (not the API URL).
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173,http://frontend:80}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      ENRICHMENT_INTERVAL_MINUTES: ${ENRICHMENT_INTERVAL_MINUTES:-60}
      ENRICHMENT_BATCH_SIZE: ${ENRICHMENT_BATCH_SIZE:-5}
    volumes:
      - ./backend/config:/app/config:ro
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Exactly one public API base URL (no commas). Override in .env on the VPS.
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    ports:
      - "5173:80"
    depends_on:
      - api

volumes:
  pgdata:
