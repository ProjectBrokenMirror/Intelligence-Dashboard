services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: pv
      POSTGRES_PASSWORD: pv
      POSTGRES_DB: pv_intel
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pv -d pv_intel"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://pv:pv@postgres:5432/pv_intel
      SOURCES_CONFIG_PATH: /app/config/sources.yaml
      CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173,http://frontend:80
    volumes:
      - ./backend/config:/app/config:ro
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:8000
    ports:
      - "5173:80"
    depends_on:
      - api

volumes:
  pgdata:
