# RSS-first sources for Banderas Bay. Disable any feed that 404s or blocks bots.
sources:
  - id: vallarta-daily
    name: Vallarta Daily News
    kind: rss
    feed_url: https://www.vallartadaily.com/feed/
    enabled: true

  - id: tribuna-de-la-bahia
    name: Tribuna de la Bahía
    kind: rss
    feed_url: https://tribunadelabahia.com.mx/feed/
    enabled: true

  - id: puerto-vallarta-daily-news
    name: Puerto Vallarta Daily News (PVDN)
    kind: rss
    feed_url: https://www.puertovallartadailynews.com/feed/
    enabled: true

  - id: vallarta-lifestyles
    name: Vallarta Lifestyles
    kind: rss
    feed_url: https://www.vallartalifestyles.com/feed/
    enabled: false

  - id: tribuna-english
    name: Tribuna (English section RSS if available)
    kind: rss
    feed_url: https://tribunadelabahia.com.mx/en/feed/
    enabled: false

  - id: example-stub-scraper
    name: Example stub scraper (no network)
    kind: scraper
    scraper_module: stub
    enabled: false
